name: CI

# Only fires on changes to the actual application -- deliberately does NOT
# include k8s/** here. The update-manifests job below commits a manifest
# change back into this same branch; without this paths filter, that commit
# would re-trigger this very workflow and loop forever.
on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "db/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/**"
      - "db/**"

# Cancel a superseded run on the same branch instead of letting an old and
# a new run both push images for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; each job below opts into more only where
# it actually needs it (packages: write to push images, contents: write
# to commit the manifest update).
permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  # GitHub Actions' expression language has no toLower()/toUpper() function
  # (unlike e.g. Azure DevOps), so lowercasing github.repository_owner --
  # OCI/Docker repository names must be all-lowercase, but the owner's actual
  # casing (e.g. "Gunthiti") is preserved in that context -- has to happen in
  # a real shell step instead, using bash's ${VAR,,} lowercasing.
  vars:
    name: compute image prefix
    runs-on: ubuntu-latest
    outputs:
      image_prefix: ${{ steps.set.outputs.image_prefix }}
    steps:
      - id: set
        run: echo "image_prefix=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mini-settlement" >> "$GITHUB_OUTPUT"

  test:
    name: build + test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [transaction-api, settlement-worker, report-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: mvn clean verify
        working-directory: services/${{ matrix.service }}
        run: mvn -B clean verify

  build-and-push:
    name: build + push image (${{ matrix.service }})
    needs: [test, vars]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [transaction-api, settlement-worker, report-service]
    env:
      IMAGE_PREFIX: ${{ needs.vars.outputs.image_prefix }}
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN is minted fresh per workflow run and scoped to this
          # repo only -- no separate registry account/secret to create,
          # which is the main reason GHCR is convenient for this project.
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          # Tag by commit SHA, never by a floating tag like ":latest".
          # Kubernetes' imagePullPolicy: IfNotPresent (see the base
          # Deployment/CronJob manifests) only re-pulls when the tag
          # actually changes -- a mutable tag would mean a rollback or a
          # Pod reschedule could silently start running different code
          # than what's recorded in the manifest.
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.sha.outputs.short_sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  update-manifests:
    name: update dev image tags
    needs: [build-and-push, vars]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      IMAGE_PREFIX: ${{ needs.vars.outputs.image_prefix }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: install kustomize
        # Installed straight from the kustomize project's own script rather
        # than a third-party marketplace action, to keep this pipeline's
        # supply chain limited to actions/*, docker/*, and the tool's own
        # publisher.
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: bump image tags in the dev overlay
        working-directory: k8s/overlays/dev
        run: |
          SHA="${{ needs.build-and-push.outputs.short_sha }}"
          # left side of "=" must match the placeholder "name:" already in
          # this overlay's images: block (ghcr.io/your-org/...), so kustomize
          # updates that entry's newName/newTag in place instead of adding a
          # second, unmatched one.
          kustomize edit set image \
            "ghcr.io/your-org/mini-settlement-transaction-api=${IMAGE_PREFIX}-transaction-api:${SHA}" \
            "ghcr.io/your-org/mini-settlement-settlement-worker=${IMAGE_PREFIX}-settlement-worker:${SHA}" \
            "ghcr.io/your-org/mini-settlement-report-service=${IMAGE_PREFIX}-report-service:${SHA}"

      # This is the ONLY thing this workflow deploys anywhere: a git commit.
      # No `kubectl apply`, no cluster credentials in this repo at all --
      # ArgoCD (Phase 5) is the thing that notices this commit and actually
      # rolls it out. See the "push-based vs pull-based" note in the
      # project write-up for why that split matters.
      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          if git diff --cached --quiet; then
            echo "no manifest changes to commit"
            exit 0
          fi
          git commit -m "chore(dev): bump image tags to ${{ needs.build-and-push.outputs.short_sha }}"
          git push origin main
