apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-service
  labels:
    app.kubernetes.io/name: report-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: report-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: report-service
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: report-service
          image: ghcr.io/your-org/mini-settlement-report-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: report-service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          # See transaction-api's Deployment for why this exists: gates
          # liveness/readiness until the JVM has actually finished starting.
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            failureThreshold: 30 # allow up to 5*30=150s to start
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
