# A hand-rolled single-instance Postgres for this demo. Real projects should
# use a managed database service or a proper operator (e.g. CloudNativePG,
# Zalando postgres-operator) instead of running stateful databases by hand
# in Kubernetes -- this is here purely so the whole stack is self-contained
# on a local Minikube/kind cluster with nothing external required.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
spec:
  replicas: 1
  # A ReadWriteOnce PVC can only be mounted by one Pod's node at a time, so a
  # rolling update (start the new Pod before killing the old one) would get
  # stuck waiting for the volume. Recreate kills the old Pod first instead.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "settlement", "-d", "settlement"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "settlement", "-d", "settlement"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init-sql
          configMap:
            name: postgres-init-sql
