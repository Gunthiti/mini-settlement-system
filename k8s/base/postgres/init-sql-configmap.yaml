# Same schema as db/init.sql (used by docker-compose). Kept in a ConfigMap
# so it can be mounted into Postgres's docker-entrypoint-initdb.d directory
# on first boot, same trick as the local Postgres image entrypoint.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS transactions (
        id          BIGSERIAL PRIMARY KEY,
        reference   VARCHAR(64) NOT NULL UNIQUE,
        amount      NUMERIC(18, 2) NOT NULL,
        currency    VARCHAR(3) NOT NULL,
        status      VARCHAR(20) NOT NULL DEFAULT 'PENDING',
        created_at  TIMESTAMP NOT NULL DEFAULT now(),
        settled_at  TIMESTAMP
    );

    CREATE INDEX IF NOT EXISTS idx_transactions_status ON transactions (status);
    CREATE INDEX IF NOT EXISTS idx_transactions_settled_at ON transactions (settled_at);
