# DEMO ONLY: plaintext Secret checked into git.
#
# This is fine for a throwaway local Minikube/kind cluster, but it is
# exactly the thing you must NOT do in a real GitOps repo -- anyone with
# read access to the manifest repo can read these values, and `git log`
# keeps them forever even if you later rotate them. In a real setup you'd
# commit a *sealed*/encrypted secret instead (e.g. Bitnami Sealed Secrets,
# SOPS, or an ExternalSecret pointing at Vault/AWS Secrets Manager/etc) and
# let a controller decrypt it inside the cluster -- the plaintext value
# never touches git at all.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
type: Opaque
stringData:
  POSTGRES_DB: settlement
  POSTGRES_USER: settlement
  POSTGRES_PASSWORD: settlement-dev-password
