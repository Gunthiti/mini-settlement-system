server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: settlement-worker
  lifecycle:
    timeout-per-shutdown-phase: 15s
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:settlement}
    username: ${DB_USER:settlement}
    password: ${DB_PASSWORD:settlement}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

settlement:
  # scheduled -> keeps running, settles every interval-ms (used locally)
  # oneshot   -> settles once and exits (used by the K8s CronJob)
  mode: ${SETTLEMENT_MODE:scheduled}
  interval-ms: ${SETTLEMENT_INTERVAL_MS:60000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
